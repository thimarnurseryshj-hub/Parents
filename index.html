(function(){
  // Namespaces all localStorage access to this specific nursery deployment,
  // so multiple nursery sites never share/overwrite each other's cached data
  // even when opened from the same browser origin (file://, same GitHub Pages account, etc).
  var NS = "kp_ns_https://thimar-nursery-default-rtdb.firebaseio.com_";
  var _get = Storage.prototype.getItem;
  var _set = Storage.prototype.setItem;
  var _remove = Storage.prototype.removeItem;
  Storage.prototype.getItem = function(key){ return _get.call(this, NS + key); };
  Storage.prototype.setItem = function(key, val){ return _set.call(this, NS + key, val); };
  Storage.prototype.removeItem = function(key){ return _remove.call(this, NS + key); };
})();
</script>

function getReceiptVerificationCode(p){
  if(!p) return 'KP-UNKNOWN';
  const raw = [p.id || '', p.date || '', p.amt || '', p.who || ''].join('|');
  let hash = 0;
  for (let i = 0; i < raw.length; i++) {
    hash = ((hash << 5) - hash) + raw.charCodeAt(i);
    hash |= 0;
  }
  const suffix = Math.abs(hash).toString(36).toUpperCase().slice(0, 6).padStart(6, '0');
  return 'KP-' + (p.id || '0000') + '-' + suffix;
}

function getReceiptVerificationUrl(p){
  const receiptId = encodeURIComponent((p && p.id) ? String(p.id) : '');
  const code = encodeURIComponent(getReceiptVerificationCode(p));
  const base = (window.KP_VERIFY_BASE_URL || '').trim();
  if (base) {
    const cleanBase = base.replace(/[?&]+$/, '');
    const joiner = cleanBase.indexOf('?') === -1 ? '?' : '&';
    return cleanBase + joiner + 'rid=' + receiptId + '&code=' + code;
  }
  try {
    const u = new URL('verify_receipt.html', window.location.href);
    u.searchParams.set('rid', (p && p.id) ? String(p.id) : '');
    u.searchParams.set('code', getReceiptVerificationCode(p));
    return u.toString();
  } catch(e) {
    return 'verify_receipt.html?rid=' + receiptId + '&code=' + code;
  }
}

function getReceiptVerificationText(p){
  return getReceiptVerificationUrl(p);
}

function getReceiptQrImageUrl(p){
  return 'https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=' + encodeURIComponent(getReceiptVerificationText(p));
}

function ensureQRiousLoaded(){
  if(window.QRious) return Promise.resolve(window.QRious);
  if(window.KP_QRIOUS_LOADING) return window.KP_QRIOUS_LOADING;
  window.KP_QRIOUS_LOADING = new Promise(function(resolve, reject){
    const sc = document.createElement('script');
    sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js';
    sc.async = true;
    sc.onload = function(){ window.QRious ? resolve(window.QRious) : reject(new Error('QR library unavailable')); };
    sc.onerror = function(){ reject(new Error('QR library failed to load')); };
    document.head.appendChild(sc);
  });
  return window.KP_QRIOUS_LOADING;
}

async function renderReceiptVerification(root, p){
  if(!root) return;
  const code = getReceiptVerificationCode(p);
  root.querySelectorAll('[data-receipt-verify-code]').forEach(function(el){ el.textContent = code; });
  root.querySelectorAll('img[data-receipt-qr-image]').forEach(function(img){ img.src = getReceiptQrImageUrl(p); });
  const canvases = root.querySelectorAll('canvas[data-receipt-qr]');
  if(!canvases.length) return;
  try{
    await ensureQRiousLoaded();
    canvases.forEach(function(canvas){
      new QRious({ element: canvas, value: getReceiptVerificationText(p), size: 96, level: 'M' });
    });
    const renderedQr = canvases[0] && canvases[0].toDataURL ? canvases[0].toDataURL("image/png") : "";
    if(renderedQr){
      root.querySelectorAll('img[data-receipt-qr-image]').forEach(function(img){ img.src = renderedQr; });
    }
  }catch(err){
    console.warn('QR generation failed:', err);
    canvases.forEach(function(canvas){
      const ctx = canvas.getContext && canvas.getContext('2d');
      if(ctx){
        canvas.width = 96; canvas.height = 96;
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,96,96);
        ctx.strokeStyle = '#2a8b54'; ctx.strokeRect(4,4,88,88);
        ctx.fillStyle = '#2a8b54'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
        ctx.fillText('VERIFY',48,42); ctx.fillText('CODE',48,58);
      }
    });
  }
}

// Falls back to upper-case lang if the formId is unknown (legacy records).
function kpEvalFormLabel(rec){
  if (!rec) return '';
  var fid = String(rec.formId || '');
  if (fid === 'ar-q1-l12') return 'AR L1+2';
  if (fid === 'ar-q1-l3')  return 'AR L3';
  if (fid === 'en-q1-l12') return 'EN L1+2';
  if (fid === 'en-q1-l3')  return 'EN L3';
  // Generic fallback: derive from lang + level
  var lang = String(rec.lang || '').toUpperCase();
  return lang || '—';
}

const KP_QUARTERS = [
  { id: 'q1', ar: 'الفصل الأول',   en: 'First Term'  },

  { id: 'q3', ar: 'الفصل الثالث',  en: 'Third Term'  },
];


function kpEvalComputeEvaluatedMonths(rec){
  var out = [false, false, false];
  if (!rec || !rec.skills) return out;
  Object.keys(rec.skills).forEach(function(rowKey){
    var row = rec.skills[rowKey];
    if (!Array.isArray(row)) return;
    for (var m = 0; m < 3; m++){
      if (row[m] !== null && row[m] !== undefined && row[m] !== '') out[m] = true;
    }
  });
  return out;
}
function kpEvalBuildFormHTML(form, student, editable, savedData, quarterId, lockedMonths, academicYear){
  var isAr = form.lang === 'ar';
  var dir = isAr ? 'rtl' : 'ltr';
  var alignTxt = isAr ? 'right' : 'left';
  var lock = Array.isArray(lockedMonths) && lockedMonths.length === 3 ? lockedMonths : [false,false,false];

  // Resolve the localized term label from the selected quarter id.
  // Falls back to the form's hardcoded default when no quarter is supplied
  // (e.g. older code paths) or when an unknown id is passed.
  var termLabel = form.term;
  if (quarterId) {
    for (var qi = 0; qi < KP_QUARTERS.length; qi++) {
      if (KP_QUARTERS[qi].id === quarterId) {
        termLabel = isAr ? KP_QUARTERS[qi].ar : KP_QUARTERS[qi].en;
        break;
      }
    }
  }

  // Resolve academic year for display (use param, else savedData, else blank)
  var yearLabel = academicYear || (savedData && savedData.academicYear) || '';

  // Compute the evaluation period (which months have data) for read-only renders
  var periodLine = '';
  if (savedData) {
    var monthsClaimed = (Array.isArray(savedData.submittedMonths) && savedData.submittedMonths.length === 3)
      ? savedData.submittedMonths.slice()
      : kpEvalComputeEvaluatedMonths(savedData);
    var monthsActual = kpEvalComputeEvaluatedMonths(savedData);
    var monthsHave = [false,false,false];
    for (var mh = 0; mh < 3; mh++) monthsHave[mh] = !!(monthsClaimed[mh] && monthsActual[mh]);
    var monthLabels = [];
    for (var mi = 0; mi < 3; mi++) if (monthsHave[mi]) monthLabels.push(form.months[mi]);
    if (monthLabels.length === 3) periodLine = isAr ? 'كامل الفصل (٣ أشهر)' : 'Full term (3 months)';
    else if (monthLabels.length > 0) periodLine = (isAr ? 'فترة التقييم: ' : 'Evaluation period: ') + monthLabels.join(isAr ? '، ' : ', ');
  }

  // Header (matches the original docx) — explicit LTR direction so the
  // positioning is the same regardless of the surrounding RTL/LTR context
  // (matters for PDF export). Order in source = visual left-to-right:
  // English left, logo center, Arabic right.
  var header = ''
    + '<div class="kp-eval-header" dir="ltr" style="border:2px solid var(--g2);border-radius:14px;padding:12px;margin-bottom:14px;background:#fff;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px">'
    + '  <div style="font-weight:800;font-size:18px;color:#1a4a82;text-align:center">' + esc((nurserySettings && nurserySettings.name_en) || 'Themar Nursery') + '</div>'
    + '  <img src="' + kpEvalGetHeaderLogo() + '" alt="logo" style="width:90px;height:90px;object-fit:contain"/>'
    + '  <div style="font-weight:800;font-size:18px;color:#1a4a82;text-align:center;direction:rtl">' + esc((nurserySettings && nurserySettings.name) || 'حضانة ثمار') + '</div>'
    + '</div>'
    + '<div style="text-align:center;font-size:18px;font-weight:800;margin-bottom:8px">' + escapeHtml(form.title) + '</div>'
    + '<div style="text-align:center;font-size:14px;color:var(--muted);margin-bottom:6px">' + escapeHtml(form.level) + ' — ' + escapeHtml(termLabel) + (yearLabel ? ' — ' + escapeHtml(yearLabel) : '') + '</div>'
    + (periodLine ? '<div style="text-align:center;font-size:13px;color:var(--g1);font-weight:700;margin-bottom:14px">' + escapeHtml(periodLine) + '</div>' : '<div style="margin-bottom:14px"></div>');

  // Skills table (desktop layout) AND skills cards (mobile layout).
  // Both are emitted simultaneously; CSS hides one based on viewport width.
  // Radios in both layouts share the same `name` attribute so the form-data
  // collector and the browser radio-group state stay perfectly in sync.
  var rows = [];
  var cards = [];
  var rowIdx = 0;
  form.groups.forEach(function(g){
    var rowsInGroup = g.skills.length;
    g.skills.forEach(function(skill, idx){
      rowIdx += 1;

      // ----- TABLE ROW (desktop) -----
      var cells = [];
      cells.push('<td style="text-align:center;font-weight:700">' + rowIdx + '</td>');

      }
      cells.push('<td class="kp-eval-sticky kp-eval-sticky-skill" style="text-align:' + alignTxt + ';font-weight:600">' + escapeHtml(skill) + '</td>');
      // 3 months Ã— 3 levels = 9 radio cells
      for (var m = 0; m < 3; m++){
        var monthLocked = !!lock[m];
        var monthDisabled = (!editable) || monthLocked;
        var dis = monthDisabled ? 'disabled' : '';
        var monthClass = 'kp-eval-month-' + (m + 1);
        var cellClass = 'kp-eval-radio ' + monthClass + (monthLocked ? ' kp-eval-month-locked' : '');
        for (var lvl = 0; lvl < 3; lvl++){
          var name = 'eval-r-' + rowIdx + '-' + m;
          var checked = '';
          if (savedData && savedData.skills) {
            var v = savedData.skills[String(rowIdx)];
            if (v && v[m] !== null && v[m] !== undefined && v[m] !== '' && Number(v[m]) === lvl) checked = 'checked';
          }
          cells.push('<td class="' + cellClass + '" style="text-align:center"><input type="radio" name="' + name + '" value="' + lvl + '" ' + dis + ' ' + checked + '/></td>');
        }
      }
      rows.push('<tr>' + cells.join('') + '</tr>');

      // ----- CARD (mobile) -----
      // One card per skill. Top: skill index + domain badge + skill text.

      var cardMonthBlocks = [];
      for (var cm = 0; cm < 3; cm++){
        var cmLocked = !!lock[cm];
        var cmDisabled = (!editable) || cmLocked;
        var cmDis = cmDisabled ? 'disabled' : '';
        var cmClass = 'kp-eval-month-' + (cm + 1) + (cmLocked ? ' kp-eval-month-locked' : '');

          // Per-level color hint inside the card so locked / unlocked is obvious.
          optsHtml += '<label class="kp-eval-card-opt"><input type="radio" name="' + cmName + '" value="' + clvl + '" ' + cmDis + ' ' + ck + '/><span>' + escapeHtml(levelLabel) + '</span></label>';
        }
        cardMonthBlocks.push(
          '<div class="kp-eval-card-month ' + cmClass + '">'
          + '<div class="kp-eval-card-month-head">'
          +   '<div class="kp-eval-card-month-label">' + escapeHtml(form.months[cm]) + lockMark + '</div>'

            )
          + '</div>'
          + '<div class="kp-eval-card-opts">' + optsHtml + '</div>'
          + '</div>'
        );
      }
      cards.push(
        '<div class="kp-eval-card">'
        + '<div class="kp-eval-card-head">'
        +   '<span class="kp-eval-card-num">' + rowIdx + '</span>'
        +   '<span class="kp-eval-card-domain">' + escapeHtml(g.domain) + '</span>'
        +   '<span class="kp-eval-card-skill">' + escapeHtml(skill) + '</span>'
        + '</div>'
        + '<div class="kp-eval-card-body">' + cardMonthBlocks.join('') + '</div>'
        + '</div>'
      );
    });
  });

  // Header row with months — color-coded per month + 🔒 marker on locked months
  var headerCellsTop = ''
    + '<th rowspan="2" style="width:36px">' + (isAr ? 'م' : '#') + '</th>'
    + '<th rowspan="2" class="kp-eval-sticky kp-eval-sticky-domain" style="min-width:90px">' + (isAr ? 'التطور' : 'Development') + '</th>'
    + '<th rowspan="2" class="kp-eval-sticky kp-eval-sticky-skill" style="min-width:200px">' + (isAr ? 'المهارة' : 'Skill') + '</th>';
  form.months.forEach(function(mo, mi){
    var lockMark = lock[mi] ? ' 🔒' : '';
    var hClass = 'kp-eval-month-' + (mi + 1) + (lock[mi] ? ' kp-eval-month-locked' : '');
    headerCellsTop += '<th colspan="3" class="' + hClass + '" style="min-width:210px">' + escapeHtml(mo) + lockMark + '</th>';
  });
  var headerCellsBot = '';
  for (var m = 0; m < 3; m++){
    var subClass = 'kp-eval-radio kp-eval-month-' + (m + 1) + (lock[m] ? ' kp-eval-month-locked' : '');
    form.scale.forEach(function(s){
      headerCellsBot += '<th class="' + subClass + '" style="font-size:11px;font-weight:600">' + escapeHtml(s) + '</th>';
    });
  }

  var table = ''
    + '<div class="kp-eval-table-wrap kp-eval-desktop-only" style="overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:8px;max-width:100%">'
    + '<table class="tbl kp-eval-table" dir="' + dir + '" style="min-width:880px;width:100%;border-collapse:collapse;table-layout:auto">'
    + '  <thead><tr>' + headerCellsTop + '</tr><tr>' + headerCellsBot + '</tr></thead>'
    + '  <tbody>' + rows.join('') + '</tbody>'
    + '</table>'
    + '</div>'
    + '<div class="kp-eval-cards kp-eval-mobile-only" dir="' + dir + '">' + cards.join('') + '</div>';

  // Footer (student name, term, signatures) — parent-return note removed per spec.
  var stuName = (student && student.name) ? student.name : '';

  // Determine which months have been submitted (so we can fill the teacher
  // signature lines with the evaluator's name). Three sources, in order of
  // authority: savedData.submittedMonths (set on every submit), the
  // host-element dataset.lockedMonths (live edits), or live-compute from
  // skill data.
  var submittedMo = [false, false, false];
  if (savedData) {
    var submittedClaimed = (Array.isArray(savedData.submittedMonths) && savedData.submittedMonths.length === 3)
      ? savedData.submittedMonths.slice()
      : kpEvalComputeEvaluatedMonths(savedData);
    var submittedActual = kpEvalComputeEvaluatedMonths(savedData);
    for (var sm = 0; sm < 3; sm++) submittedMo[sm] = !!(submittedClaimed[sm] && submittedActual[sm]);
  }
  // Resolve the evaluator's display name. Prefer the saved `submittedBy`
  // on the record; if rendering a fresh form (no savedData yet), fall back
  // to the currently logged-in user (whoever is filling the form right now).
  var evaluatorName = '';
  if (savedData && savedData.submittedBy) {
    evaluatorName = String(savedData.submittedBy);
  } else if (typeof currentUser !== 'undefined' && currentUser) {
    evaluatorName = String(currentUser.name || currentUser.username || '');
  }

  function teacherSigSlot(mIdx){
    var label = (isAr ? 'توقيع المعلمة' : 'Teacher signature') + ' (' + escapeHtml(form.months[mIdx]) + ')';
    if (submittedMo[mIdx] && evaluatorName) {
      // Filled — render the evaluator's name as the "signature" with a small
      // submit-date underneath if we have one.
      var dateStr = (savedData && savedData.submittedAt) ? String(savedData.submittedAt).slice(0, 10) : '';
      return '<div><b>' + label + '</b>'
        + '<div style="border-bottom:1px solid #aaa;min-height:18px;padding:1px 4px;font-weight:700;color:#1a4a82">'
        + escapeHtml(evaluatorName)
        + (dateStr ? '<div style="font-size:9px;font-weight:400;color:#888">' + escapeHtml(dateStr) + '</div>' : '')
        + '</div></div>';
    }
    // Empty — no submission yet for this month
    return '<div><b>' + label + '</b><div style="border-bottom:1px solid #aaa;height:18px"></div></div>';
  }

  var footer = ''
    + '<div style="margin-top:6px;font-size:11px;display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    + '  <div><b>' + (isAr ? 'اسم الطالب' : 'Student name') + ':</b> ' + escapeHtml(stuName) + '</div>'
    + '  <div style="text-align:' + (isAr ? 'left' : 'right') + '"><b>' + (isAr ? 'الفصل' : 'Term') + ':</b> ' + escapeHtml(termLabel) + '</div>'
    + '</div>'
    + '<div style="margin-top:7px;font-size:10px;color:var(--muted);display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center">'
    + teacherSigSlot(0)
    + teacherSigSlot(1)
    + teacherSigSlot(2)
    + '</div>'
    + '<div style="margin-top:5px;font-size:10px;color:var(--muted);display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center">'
    + '  <div><b>' + (isAr ? 'توقيع الإدارة' : 'Manager signature') + '</b><div id="eval-stamp-1" style="border-bottom:1px solid #aaa;height:24px"></div></div>'
    + '  <div><b>' + (isAr ? 'توقيع الإدارة' : 'Manager signature') + '</b><div id="eval-stamp-2" style="border-bottom:1px solid #aaa;height:24px"></div></div>'
    + '  <div><b>' + (isAr ? 'توقيع الإدارة' : 'Manager signature') + '</b><div id="eval-stamp-3" style="border-bottom:1px solid #aaa;height:24px"></div></div>'
    + '</div>';

  return header + table + footer;
}


function normalizePaymentForReceipt(p){
  p = p || {};
  return Object.assign({}, p, {
    id: first(p,["id","receiptNo","receiptNumber","number","receiptId"]) || '',
    amt: first(p,["amt","amount","paid","total","value"]) || 0,
    who: first(p,["who","studentName","payerName","name"]) || studentName(parentStudents[currentStudentIndex]||{}),
    method: first(p,["method","paymentMethod","paidBy"]) || '',
    desc: first(p,["desc","description","type","month","notes","feeType"]) || '',
    note: first(p,["note","notes","remarks"]) || '',
    rcvr: first(p,["rcvr","receivedBy","createdBy","user"]) || '',
    date: first(p,["date","paymentDate","createdAt"]) || ''
  });
}
window.renderExactReceipt = function(p, autoPrint){
  var rp = normalizePaymentForReceipt(p);
  openDetail('سند قبض', buildReceiptHTML(rp), false);
  setTimeout(function(){
    Promise.resolve(renderReceiptVerification(document.getElementById('printArea'), rp)).then(function(){
      if(autoPrint) printDetail();
    });
  }, 100);
}
window.renderExactEvaluation = function(e, autoPrint){
  var s = parentStudents[currentStudentIndex] || {};
  var stu = { id: studentId(s), name: studentName(s) };
  var form = KP_FORMS[e.formId] || KP_FORM_AR;
  var formHtml = kpEvalBuildFormHTML(form, stu, false, e, e.quarter, null, e.academicYear);
  var temp = document.createElement('div');
  temp.innerHTML = formHtml;
  if ((e.status === 'approved' || e.approvedAt) && e.stampDataUrl) {
    var stampHtml = ''
      + '<img src="' + e.stampDataUrl + '" alt="stamp" style="height:38px;display:block;margin:0 auto"/>'
      + '<div style="font-size:10px;color:#666;text-align:center;margin-top:2px">'
      + escapeHtml(e.approvedBy||'') + ' — ' + escapeHtml((e.approvedAt||'').slice(0,10)) + '</div>';
    var monthsClaimed = (Array.isArray(e.evaluatedMonths) && e.evaluatedMonths.length === 3)
      ? e.evaluatedMonths : kpEvalComputeEvaluatedMonths(e);
    // Cross-check with actual skill data to prevent phantom stamps on unevaluated months
    var monthsActual = kpEvalComputeEvaluatedMonths(e);
    var months = [
      !!(monthsClaimed[0] && monthsActual[0]),
      !!(monthsClaimed[1] && monthsActual[1]),
      !!(monthsClaimed[2] && monthsActual[2])
    ];
    for (var mi=0; mi<3; mi++) {
      if (months[mi]) {
        var slot = temp.querySelector('#eval-stamp-' + (mi+1));
        if (slot) slot.innerHTML = stampHtml;
      }
    }
  }
  try {
    var cardsForPrint = temp.querySelector('.kp-eval-cards');
    if (cardsForPrint && cardsForPrint.parentNode) cardsForPrint.parentNode.removeChild(cardsForPrint);
    // Clear ALL radio checked states first (Number(null)===0 bug marks level-0 as checked on null months)
    temp.querySelectorAll('table.kp-eval-table input[type="radio"]').forEach(function(r){
      r.checked = false; r.removeAttribute('checked');
    });
    if (e && e.skills) {
      Object.keys(e.skills).forEach(function(rowKey){
        var vals = e.skills[rowKey] || [];
        for (var mm=0; mm<3; mm++) {
          var vv = vals[mm];
          if (vv === undefined || vv === null || vv === '') continue;
          var inp = temp.querySelector('table.kp-eval-table input[name="eval-r-' + rowKey + '-' + mm + '"][value="' + Number(vv) + '"]');
          if (inp) { inp.checked = true; inp.setAttribute('checked','checked'); }
        }
      });
    }
  } catch(_e){}
  var oldHeader = temp.querySelector('.kp-eval-header');
  if (oldHeader && oldHeader.parentNode) oldHeader.parentNode.removeChild(oldHeader);
  var cleanHeader = ''
    + '<div class="kp-parent-eval-print-header">'
    + '  <div>' + esc((nurserySettings && nurserySettings.name_en) || 'Themar Nursery') + '</div>'
    + '  <img src="' + kpEvalGetHeaderLogo() + '" alt="Nursery Logo">'
    + '  <div class="ar">' + esc((nurserySettings && nurserySettings.name) || 'حضانة ثمار') + '</div>'
    + '</div>';
  openDetail('\u0627\u0633\u062a\u0645\u0627\u0631\u0629 \u062a\u0642\u064a\u064a\u0645 \u0641\u0635\u0644\u064a\u0629', '<div class="kp-eval-print-parent">' + cleanHeader + temp.innerHTML + '</div>', autoPrint);
}
</script>

let currentParentEmail="", parentStudents=[], currentStudentIndex=0, db={}, parentPayments=[], parentEvaluations=[];
const KP_PARENT_SESSION_KEY = "kp_parent_session_v1";
const KP_PARENT_SESSION_MAX_AGE = 1000 * 60 * 60 * 24 * 7;
function $(id){return document.getElementById(id)}
function norm(v){return String(v||"").trim().toLowerCase()}
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function msg(id,text,type){const el=$(id);el.textContent=text||"";el.className="msg on "+(type||"err")}
function clearMsg(id){const el=$(id);el.textContent="";el.className="msg"}
function loader(id,on){$(id).classList.toggle("on",!!on)}
function saveParentSession(){
  try{
    const students=parentStudents.map(s=>({id:studentId(s),name:studentName(s),fatherEmail:studentField(s,"fatherEmail"),motherEmail:studentField(s,"motherEmail")}));
    localStorage.setItem(KP_PARENT_SESSION_KEY,JSON.stringify({email:currentParentEmail,students,savedAt:Date.now()}));
  }catch(e){}
}
function clearParentSession(){try{localStorage.removeItem(KP_PARENT_SESSION_KEY)}catch(e){}}
async function restoreParentSession(){
  let saved=null;
  try{saved=JSON.parse(localStorage.getItem(KP_PARENT_SESSION_KEY)||"null")}catch(e){saved=null}
  if(!saved||!saved.email||!saved.savedAt||Date.now()-saved.savedAt>KP_PARENT_SESSION_MAX_AGE){clearParentSession();return false}
  currentParentEmail=norm(saved.email);
  if($("parentEmail"))$("parentEmail").value=currentParentEmail;
  try{db=await getJson(FB_BASE+".json")||{}}catch(e){db={}}
  const savedStudents=(saved.students||[]).map(x=>flattenRecord(x,"saved"));
  parentStudents=savedStudents.map(matchAndEnrichStudent).filter(s=>isParentLinkedToStudent(s,currentParentEmail));
  if(!parentStudents.length){clearParentSession();return false}
  openDashboard();
  return true;
}
async function getJson(url){const r=await fetch(url);return await r.json()}
async function postJson(url,data){const r=await fetch(url,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(data)});const t=await r.text();try{return JSON.parse(t)}catch(e){return{success:false,message:t||e.message}}}
function first(obj,keys){for(const k of keys){if(obj&&obj[k]!=null&&String(obj[k]).trim()!=="")return obj[k]}return ""}
function flattenRecord(raw,source){raw=raw||{};const out={};Object.assign(out,raw);function copy(src,prefix){if(!src||typeof src!=="object")return;Object.keys(src).forEach(k=>{const v=src[k];if(v==null||typeof v==="object")return;if(prefix)out[prefix+k.charAt(0).toUpperCase()+k.slice(1)]=v;else if(out[k]==null||out[k]==="")out[k]=v})}["student","child","data","formData"].forEach(k=>copy(raw[k],""));copy(raw.father,"father");copy(raw.dad,"father");copy(raw.mother,"mother");copy(raw.mom,"mother");copy(raw.parent,"parent");copy(raw.parents,"parent");out.id=out.id||out.studentId||out.childId||out.key||out._key||"";if(source)out._source=source;return out}
function collection(obj,source){if(!obj)return[];if(Array.isArray(obj))return obj.filter(Boolean).map(x=>flattenRecord(x,source));return Object.keys(obj).map(k=>{const r=flattenRecord(obj[k],source);if(!r.id)r.id=k;return r})}
function compact(v){return String(v||"").toLowerCase().replace(/[\s_\-–—.،,\/\\]+/g,"").trim()}
function arabicKey(v){return compact(String(v||"").replace(/[أإآ]/g,"ا").replace(/[ة]/g,"ه").replace(/[ى]/g,"ي"))}

function normalizeArabicName(str){
  return String(str||'')
    .toLowerCase()
    .replace(/[\u064B-\u065F\u0670]/g,'')
    .replace(/[إأآٱا]/g,'ا')
    .replace(/ة/g,'ه')
    .replace(/ى/g,'ي')
    .replace(/ؤ/g,'و')
    .replace(/ئ/g,'ي')
    .replace(/\b(father|mother|of|child|kid|parent)\b/gi,' ')
    .replace(/\b(والد|والده|والدة|والد\/والدة|الطفل|الطفلة|الطالب|الطالبة|ابو|أبو|ام|أم|ابن|بنت|للطفل|للطفلة|خاص|رسوم|قسط|شهر|عن|لصالح|تسجيل|اشتراك)\b/g,' ')
    .replace(/[0-9]+/g,' ')
    .replace(/[^ء-غف-يa-z\s]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}
function extractChildNameFromPayerName(who){
  let s=String(who||'');
  s=s.replace(/[\-–—_]+/g,' ');
  s=s.replace(/\((.*?)\)/g,' $1 ');
  return normalizeArabicName(s);
}
function getNameTokens(str){return normalizeArabicName(str).split(' ').filter(Boolean)}
function tokenIntersectionCount(a,b){let c=0;a.forEach(t=>{if(b.includes(t))c++});return c}
function isOrderedSubset(needle,haystack){let j=0;for(let i=0;i<haystack.length&&j<needle.length;i++){if(haystack[i]===needle[j])j++}return j===needle.length}
function scorePaymentStudentMatch(payment,student){
  const payName=extractChildNameFromPayerName(first(payment,["who","payerName","studentName","name","desc","description"])||"");
  const stuName=normalizeArabicName(studentName(student));
  if(!payName||!stuName)return 0;
  if(payName===stuName)return 100;
  const payTokens=getNameTokens(payName), stuTokens=getNameTokens(stuName);
  if(!payTokens.length||!stuTokens.length)return 0;
  const common=tokenIntersectionCount(stuTokens,payTokens);
  if(!common)return 0;
  let score=0;
  const overlapStudent=common/stuTokens.length;
  const overlapPayer=common/payTokens.length;
  score+=overlapStudent*52;
  score+=overlapPayer*18;
  if(isOrderedSubset(stuTokens,payTokens))score+=16;
  if(payName.includes(stuName)||stuName.includes(payName))score+=12;
  if(stuTokens[0]&&payTokens[0]===stuTokens[0])score+=10;
  if(stuTokens.length>=2&&payTokens.length>=2&&stuTokens[1]===payTokens[1])score+=6;
  if(stuTokens.length>=3&&payTokens.slice(0,3).join(' ')===stuTokens.slice(0,3).join(' '))score+=8;
  if(stuTokens.length>=2&&common>=2&&overlapStudent>=0.66)score+=8;
  if(stuTokens.length===1&&common===1)score+=6;

  const dadTokens=getNameTokens(studentField(student,"fatherName"));
  const momTokens=getNameTokens(studentField(student,"motherName"));
  const whoNorm=normalizeArabicName(first(payment,["who","payerName","desc","description"])||"");
  const whoTokens=getNameTokens(whoNorm);
  const dadCommon=dadTokens.length?tokenIntersectionCount(dadTokens,whoTokens):0;
  const momCommon=momTokens.length?tokenIntersectionCount(momTokens,whoTokens):0;
  if(dadCommon>=2||(dadTokens.length===1&&dadCommon===1))score+=10;
  if(momCommon>=2||(momTokens.length===1&&momCommon===1))score+=10;
  if((dadTokens.length&&whoNorm.includes(dadTokens.join(' ')))||(momTokens.length&&whoNorm.includes(momTokens.join(' '))))score+=6;

  if(common===1&&stuTokens.length>=3)score-=20;
  if(common===1&&stuTokens.length===2)score-=12;
  if(overlapStudent<0.5&&common<2)score-=10;
  return Math.max(0,Math.min(100,Math.round(score)));
}
function paymentLinkedToStudent(p,s){
  p=flattenRecord(p);
  const sid=String(studentId(s)||"");
  const pSid=String(first(p,["stuId","studentId","student_id","childId","linkedStudentId"])||"");
  if(sid&&pSid&&sid===pSid)return true;

  // confirmed/suggested fields used by different versions
  const matchId=String(first(p,["matchedStudentId","paymentStudentId","confirmedStudentId"])||"");
  if(sid&&matchId&&sid===matchId)return true;

  // If payment already contains student name exactly or strongly
  if(sameStudent(p,s))return true;

  // Same matching logic as the main system, but only against this linked student.
  return scorePaymentStudentMatch(p,s)>=60;
}
function paymentSortValue(p){
  const id=Number(first(p,["id","receiptNo","receiptNumber","number","receiptId"])||0);
  const date=Date.parse(first(p,["date","paymentDate","createdAt"])||"")||0;

function docValue(s, keys){
  const wanted = (keys||[]).map(k=>String(k).toLowerCase()).filter(Boolean);
  const seen = new Set();
  const urlFields = ['url','dataurl','downloadurl','link','href','fileurl','fileurl','storageurl','path','src','base64','content','value'];
  function clean(v){
    if(!v) return '';
    if(typeof v === 'string') {
      const x=v.trim();
      if(!x || x===LOGO_SRC) return '';
      return x;
    }
    if(typeof v === 'object'){
      for(const k of Object.keys(v)){
        const lk=k.toLowerCase();
        if(urlFields.includes(lk)){
          const picked=clean(v[k]);
          if(picked) return picked;
        }
      }
    }
    return '';
  }
  function matches(text){
    const t=String(text||'').toLowerCase();
    return wanted.some(w => w && (t===w || t.includes(w)));
  }
  function objectIsWanted(obj,path){
    if(matches(path)) return true;
    if(!obj || typeof obj !== 'object') return false;
    return matches(obj.type)||matches(obj.kind)||matches(obj.category)||matches(obj.documentType)||matches(obj.docType)||matches(obj.name)||matches(obj.label)||matches(obj.title);
  }
  for(const k of keys){
    const direct = clean(s && s[k]);
    if(direct) return direct;
  }
  function visit(obj, depth, path, inWantedBranch){
    if(!obj || depth>6) return '';
    if(typeof obj === 'string') return inWantedBranch ? clean(obj) : '';
    if(typeof obj !== 'object' || seen.has(obj)) return '';
    seen.add(obj);
    const branchWanted = inWantedBranch || objectIsWanted(obj,path);
    if(branchWanted){
      const picked=clean(obj);
      if(picked) return picked;
    }
    if(Array.isArray(obj)){
      for(const item of obj){
        const found=visit(item, depth+1, path, branchWanted || objectIsWanted(item,path));
        if(found) return found;
      }
      return '';
    }
    for(const key of Object.keys(obj)){
      const lk=key.toLowerCase();
      const nextPath=(path?path+'.':'')+lk;
      const keyWanted = matches(lk) || matches(nextPath);
      if(keyWanted){
        const direct=clean(obj[key]);
        if(direct) return direct;
        const nested=visit(obj[key], depth+1, nextPath, true);
        if(nested) return nested;
      }
    }
    for(const key of Object.keys(obj)){
      const lk=key.toLowerCase();
      if(/document|documents|attachment|attachments|file|files|docs|uploads|renewal|student|child|parent|father|mother/i.test(lk)){
        const found=visit(obj[key], depth+1, (path?path+'.':'')+lk, branchWanted);
        if(found) return found;
      }
    }
    return '';
  }
  return visit(s,0,'',false);
}

    ['idNo','رقم الهوية','idNo'],
    ['cls','الفصل','cls'],
    ['dad','اسم الأب','fatherName'],
    ['dph','هاتف الأب','fatherPhone'],
    ['dadEmail','إيميل الأب','fatherEmail'],
    ['job','عمل الأب','fatherJob'],
    ['mom','اسم الأم','motherName'],
    ['mph','هاتف الأم','motherPhone'],
    ['momEmail','إيميل الأم','motherEmail'],
    ['momJob','عمل الأم','motherJob'],
    ['addr','العنوان','address'],
    ['emergName','جهة الطوارئ','emergencyName'],
    ['emergRel','صلة القرابة','emergencyRel'],
    ['emergMob','هاتف الطوارئ','emergencyPhone'],
    ['health','الحالة الصحية','health'],
    ['note','ملاحظات','notes']
  ];
  var DOC_FIELDS = [
    ['imgChildPhoto','صورة الطفل'],
    ['imgPassport','جواز السفر'],
    ['imgEmiratesId','الهوية الإماراتية'],
    ['imgBirthCert','شهادة الميلاد'],
    ['imgVaccination','بطاقة التطعيم'],
    ['imgMedical','تقرير طبي / حساسية'],
    ['imgDadId','هوية الأب'],
    ['imgDadPassport','جواز الأب'],
    ['imgMomId','هوية الأم'],
    ['imgMomPassport','جواز الأم'],
    ['imgResidency','الإقامة'],
    ['imgGuardianId','هوية ولي الأمر'],
    ['imgGuardianPass','جواز ولي الأمر']
  ];

  function clean(v){ return String(v == null ? '' : v).trim(); }
  function escapeHtml(v){
    if (typeof esc === 'function') return esc(v);
    return String(v == null ? '' : v).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function el(id){ return document.getElementById(id); }
  function getStudentSafe(){
    try { return (typeof parentStudents !== 'undefined' && parentStudents[currentStudentIndex]) ? parentStudents[currentStudentIndex] : {}; }
    catch(_e){ return {}; }
  }
  function firstValue(obj, keys){
    obj = obj || {};
    for (var i=0;i<keys.length;i++){
      var k = keys[i];
      if (obj[k] !== undefined && obj[k] !== null && clean(obj[k]) !== '') return obj[k];
    }
    return '';
  }
  function fieldValue(s, key, group){
    var value = '';
    try { if (s && s[key] !== undefined && s[key] !== null) value = s[key]; } catch(_e){}
    if (clean(value) === '' && group && typeof studentField === 'function') {
      try { value = studentField(s, group); } catch(_e2){}
    }
    if (clean(value) === '') {
      var aliases = [key];
      if (key === 'bpl') aliases.push('birthPlace','placeOfBirth');
      if (key === 'gen') aliases.push('gender','sex');
      if (key === 'nat') aliases.push('nationality');
      if (key === 'cls') aliases.push('class','className','studentClass','grade');
      if (key === 'dad') aliases.push('fatherName','dadName','parentName','guardianName');
      if (key === 'dph') aliases.push('fatherPhone','dadPhone','dadMobile','dadMob');
      if (key === 'job') aliases.push('fatherJob','dadJob','fatherWork','dadWork');
      if (key === 'mom') aliases.push('motherName','momName');
      if (key === 'mph') aliases.push('motherPhone','momPhone','momMobile','momMob');
      if (key === 'momJob') aliases.push('motherJob','motherWork','momWork');
      if (key === 'addr') aliases.push('address','homeAddress','fullAddress');
      if (key === 'emergMob') aliases.push('emergencyPhone','emergencyMobile','emergencyContactPhone');
      if (key === 'emergName') aliases.push('emergencyName','emergencyContact','emergencyPerson');
      if (key === 'emergRel') aliases.push('emergencyRelation');
      value = firstValue(s, aliases);
    }
    return value == null ? '' : value;
  }
  function studentIdSafe(s){
    try { if (typeof studentId === 'function') return clean(studentId(s)); } catch(_e){}
    return clean(firstValue(s, ['id','studentId','childId','student_id','key','_key']));
  }
  function showRequestMsg(text, type){
    var m = el('requestMsg');
    if (!m) return;
    m.textContent = text || '';
    m.className = 'msg on ' + (type === 'ok' ? 'ok' : 'err');
    m.style.display = 'block';
    try { m.scrollIntoView({behavior:'smooth', block:'nearest'}); } catch(_e){}
  }
  function setSubmitBusy(isBusy){
    var btn = el('requestSubmitBtn');
    if (!btn) return;
    btn.disabled = !!isBusy;
    btn.style.opacity = isBusy ? '.72' : '';
    btn.textContent = isBusy ? 'جاري إرسال الطلب...' : 'إرسال طلب التعديل';
  }
  function readFileData(file){
    return new Promise(function(resolve, reject){
      if (!file) return resolve(null);
      if (file.size > MAX_ATTACHMENT_BYTES) return reject(new Error('حجم الملف كبير. الحد الأقصى 5MB لكل مرفق.'));
      var r = new FileReader();
      r.onload = function(){ resolve({data:r.result, name:file.name, type:file.type || 'application/octet-stream', size:file.size}); };
      r.onerror = function(){ reject(new Error('تعذر قراءة الملف: ' + file.name)); };
      r.readAsDataURL(file);
    });
  }

  function buildRenderRequest(){
    var s = getStudentSafe();
    var html = '<h3>طلب تعديل البيانات</h3>';
    html += '<div class="hint">لن يتم تعديل ملف الطالب مباشرة. سيتم إرسال الطلب للإدارة للمراجعة والاعتماد.</div>';
    html += '<div class="requestGrid">';
    BASE_FIELDS.forEach(function(f){
      var key = f[0], label = f[1], group = f[2];
      html += '<div><label>' + escapeHtml(label) + '</label><input id="req_' + key + '" value="' + escapeHtml(fieldValue(s, key, group)) + '"></div>';
    });
    DOC_FIELDS.forEach(function(f){
      var key = f[0], label = f[1];
      var current = fieldValue(s, key, key);
      html += '<div><label>' + escapeHtml(label) + '</label><small style="display:block;color:var(--muted);font-weight:800;margin-bottom:6px">' + (clean(current) ? 'ملف مرفق - اختر ملفاً جديداً للتحديث' : 'لا يوجد ملف حالياً') + '</small><input type="file" id="req_' + key + '" accept="image/*,application/pdf"></div>';
    });
    html += '</div>';
    html += '<label>ملاحظة لشرح سبب التعديل</label><textarea id="requestNote" placeholder="اكتبي سبب التعديل هنا عند الحاجة"></textarea>';
    html += '<div class="actions"><button id="requestSubmitBtn" class="btn" type="button" onclick="submitChangeRequest()">إرسال طلب التعديل</button></div><div id="requestMsg" class="msg"></div>';
    var host = el('viewRequest');
    if (host) host.innerHTML = html;
  }

  async function buildSubmitChangeRequest(){
    setSubmitBusy(true);
    try{
      var s = getStudentSafe();
      if (!s || !Object.keys(s).length) throw new Error('لم يتم العثور على بيانات الطالب الحالية. يرجى تسجيل الخروج والدخول مرة أخرى.');
      var changes = {};
      BASE_FIELDS.forEach(function(f){
        var key = f[0], label = f[1], group = f[2];
        var input = el('req_' + key);
        if (!input) return;
        var oldValue = clean(fieldValue(s, key, group));
        var newValue = clean(input.value);
        if (newValue !== oldValue) {
          changes[key] = { label:label, field:key, systemField:group || key, oldValue:oldValue, newValue:newValue };
        }
      });
      for (var i=0;i<DOC_FIELDS.length;i++){
        var dkey = DOC_FIELDS[i][0], dlabel = DOC_FIELDS[i][1];
        var inputFile = el('req_' + dkey);
        if (inputFile && inputFile.files && inputFile.files[0]) {
          var file = await readFileData(inputFile.files[0]);
          changes[dkey] = {
            label:dlabel, field:dkey, systemField:dkey,
            oldValue:clean(fieldValue(s, dkey, dkey)) ? 'ملف مرفق' : '',
            newValue:file.name, fileName:file.name, fileType:file.type, fileSize:file.size,
            fileData:file.data, isAttachment:true
          };
        }
      }
      var noteBox = el('requestNote');
      var note = noteBox ? clean(noteBox.value) : '';
      if (!Object.keys(changes).length && !note) {
        showRequestMsg('لا يوجد أي تغيير لإرساله.', 'err');
        return;
      }
      if (typeof FB_BASE === 'undefined' || !FB_BASE) throw new Error('Firebase غير مهيأ داخل الصفحة.');
      var id = 'cr_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      var req = {
        id:id,
        type:'studentChangeRequest',
        studentId:studentIdSafe(s),
        studentName:clean((typeof studentName === 'function' ? studentName(s) : '') || fieldValue(s, 'name', 'name') || fieldValue(s, 'nameEn', 'nameEn')),
        studentClass:clean(fieldValue(s, 'cls', 'cls')),
        parentEmail:(typeof currentParentEmail !== 'undefined' ? currentParentEmail : ''),
        parentPhone:clean(fieldValue(s, 'dph', 'fatherPhone') || fieldValue(s, 'mph', 'motherPhone') || fieldValue(s, 'phone', 'phone')),
        status:'pending',
        createdAt:new Date().toISOString(),
        updatedAt:new Date().toISOString(),
        note:note,
        changes:changes,
        source:'parent_portal'
      };
      var url = FB_BASE + '/studentChangeRequests/pending/' + encodeURIComponent(id) + '.json';
      var res = await fetch(url, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(req)});
      if (!res.ok) throw new Error('فشل حفظ الطلب على Firebase (' + res.status + ').');
      showRequestMsg('تم إرسال طلب التعديل للإدارة بنجاح.', 'ok');
    } catch(e) {
      showRequestMsg('تعذر إرسال الطلب: ' + (e && e.message ? e.message : String(e)), 'err');
    } finally {
      setSubmitBusy(false);
    }
  }

  window.renderRequest = buildRenderRequest;
  window.submitChangeRequest = buildSubmitChangeRequest;
  try { renderRequest = window.renderRequest; } catch(_e) {}
  try { submitChangeRequest = window.submitChangeRequest; } catch(_e2) {}
  try {
    var visibleRequest = el('viewRequest');
    if (visibleRequest && !visibleRequest.classList.contains('hidden')) window.renderRequest();
  } catch(_e3) {}
})();
</script>
